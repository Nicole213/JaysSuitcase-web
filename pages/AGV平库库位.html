<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV平库库位管理</title>
    <link rel="stylesheet" href="../styles/pages.css">
    <link rel="stylesheet" href="../styles/agv-location.css">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1>AGV平库库位管理</h1>
        </div>

        <!-- 查询筛选区 -->
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>库位编码：</label>
                    <input type="text" class="filter-input" id="searchCode" placeholder="请输入库位编码">
                </div>
                <div class="filter-group">
                    <label>所属库区：</label>
                    <select class="filter-select" id="areaFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>通道：</label>
                    <select class="filter-select" id="channelFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>当前状态：</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="">全部</option>
                        <option value="空库位">空库位</option>
                        <option value="有货">有货</option>
                        <option value="已分配">已分配</option>
                        <option value="空托">空托</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>锁定状态：</label>
                    <select class="filter-select" id="lockFilter">
                        <option value="">全部</option>
                        <option value="锁定">锁定</option>
                        <option value="正常">正常</option>
                    </select>
                </div>
                <button class="search-btn" id="searchBtn">🔍 查询</button>
                <button class="reset-btn" id="resetBtn">🔄 重置</button>
            </div>
        </div>

        <!-- 操作按钮区 -->
        <div class="action-bar">
            <button class="primary-btn" id="addBtn">➕ 新增库位</button>
        </div>

        <!-- 表格区 -->
        <div class="table-section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="120">库位编码</th>
                        <th width="120">所属库区</th>
                        <th width="120">通道</th>
                        <th width="100">当前状态</th>
                        <th width="100">锁定状态</th>
                        <th width="100">启用状态</th>
                        <th width="120">当前容器号</th>
                        <th width="100">AGV站点</th>
                        <th width="100">站点类型</th>
                        <th width="200">操作</th>
                    </tr>
                </thead>
                <tbody id="locationTableBody">
                    <!-- 数据将通过JavaScript动态生成 -->
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination">
            <button class="page-btn" id="prevPage">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页</span>
            <button class="page-btn" id="nextPage">下一页</button>
        </div>
    </div>

    <!-- 新增/编辑库位弹窗 -->
    <div class="modal" id="locationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增AGV平库库位</h3>
                <span class="modal-close" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="locationForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">库位编码：</label>
                            <input type="text" class="form-input" id="locationCode" required>
                        </div>
                        <div class="form-group">
                            <label class="required">所属库区：</label>
                            <select class="form-input" id="belongArea" required>
                                <option value="">请选择</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">通道：</label>
                            <select class="form-input" id="channel" required>
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">当前状态：</label>
                            <select class="form-input" id="currentStatus" required>
                                <option value="空库位">空库位</option>
                                <option value="有货">有货</option>
                                <option value="已分配">已分配</option>
                                <option value="空托">空托</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>当前容器号：</label>
                            <input type="text" class="form-input" id="containerNo" placeholder="请输入容器号">
                        </div>
                        <div class="form-group">
                            <label class="required">是否AGV站点：</label>
                            <select class="form-input" id="isAgvSite" required>
                                <option value="否">否</option>
                                <option value="是">是</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>站点类型：</label>
                            <select class="form-input" id="siteType">
                                <option value="">请选择</option>
                                <option value="入库站点">入库站点</option>
                                <option value="出库站点">出库站点</option>
                                <option value="缓存站点">缓存站点</option>
                                <option value="检测站点">检测站点</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">启用状态：</label>
                            <select class="form-input" id="enableStatus" required>
                                <option value="启用">启用</option>
                                <option value="禁用">禁用</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>备注：</label>
                            <textarea class="form-input" id="remark" rows="3" placeholder="请输入备注信息"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn primary" id="saveBtn">保存</button>
                <button class="modal-btn secondary" id="cancelBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="../scripts/agv-location.js"></script>
</body>
</html>
