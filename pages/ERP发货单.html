<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP发货单</title>
    <link rel="stylesheet" href="../styles/pages.css">
    <link rel="stylesheet" href="../styles/mes-work-order.css">
    <link rel="stylesheet" href="../styles/erp-shipment.css">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1>ERP发货单</h1>
        </div>

        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>发货单编号：</label>
                    <input type="text" class="filter-input" id="searchShipmentNo" placeholder="请输入发货单编号">
                </div>
                <div class="filter-group">
                    <label>发货状态：</label>
                    <select class="filter-select" id="searchStatus">
                        <option value="">全部</option>
                        <option value="未发货">未发货</option>
                        <option value="发货中">发货中</option>
                        <option value="已完成">已完成</option>
                        <option value="已取消">已取消</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>客户信息：</label>
                    <input type="text" class="filter-input wide" id="searchCustomerKeyword" placeholder="请输入客户名称或客户编码">
                </div>
                <div class="filter-group">
                    <label>物料信息：</label>
                    <input type="text" class="filter-input wide" id="searchMaterialKeyword" placeholder="请输入物料编码或物料名称">
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>同步时间：</label>
                    <input type="date" class="filter-input-date" id="searchSyncStart">
                    <span class="date-separator">至</span>
                    <input type="date" class="filter-input-date" id="searchSyncEnd">
                </div>
                <div class="filter-group">
                    <label>发货时间：</label>
                    <input type="date" class="filter-input-date" id="searchDeliveryStart">
                    <span class="date-separator">至</span>
                    <input type="date" class="filter-input-date" id="searchDeliveryEnd">
                </div>
                <button class="search-btn" id="searchBtn">查询</button>
                <button class="reset-btn" id="resetBtn">重置</button>
            </div>
        </div>

        <div class="table-section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="180">发货单编号</th>
                        <th width="120">发货单状态</th>
                        <th width="180">客户名称</th>
                        <th width="140">客户编码</th>
                        <th width="300">物料信息</th>
                        <th width="110">计划发货数量</th>
                        <th width="110">已发货数量</th>
                        <th width="170">同步时间</th>
                        <th width="170">发货时间</th>
                        <th width="260">操作</th>
                    </tr>
                </thead>
                <tbody id="shipmentTableBody"></tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" id="prevPage">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页</span>
            <button class="page-btn" id="nextPage">下一页</button>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content modal-content-wide">
            <div class="modal-header">
                <h3>ERP发货单详情</h3>
                <span class="modal-close" id="closeDetailModal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="detail-basic-section">
                    <div class="detail-basic-title">基础信息</div>
                    <div class="detail-basic-grid erp-detail-grid" id="detailSummary"></div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-header">
                        <h4>物料信息</h4>
                    </div>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th width="80">序号</th>
                                <th width="160">物料编码</th>
                                <th width="220">物料名称</th>
                                <th width="120">计划发货数量</th>
                                <th width="120">已发货数量</th>
                            </tr>
                        </thead>
                        <tbody id="materialTableBody"></tbody>
                    </table>
                </div>

                <div class="detail-section">
                    <div class="detail-section-header">
                        <h4>成品出库明细</h4>
                    </div>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th width="70">序号</th>
                                <th width="140">物料编码</th>
                                <th width="170">物料名称</th>
                                <th width="130">容器编码</th>
                                <th width="100">出库数量</th>
                                <th width="110">库区编码</th>
                                <th width="130">库位编码</th>
                                <th width="160">出库时间</th>
                                <th width="100">状态</th>
                                <th width="90">操作</th>
                            </tr>
                        </thead>
                        <tbody id="outboundTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="closeDetailBtn">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal" id="itemDetailModal">
        <div class="modal-content modal-content-item-detail">
            <div class="modal-header">
                <h3 id="itemDetailTitle">托盘明细</h3>
                <span class="modal-close" id="closeItemDetailModal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="item-detail-content" id="itemDetailContent"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="closeItemDetailBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="../scripts/erp-shipment.js"></script>
</body>
</html>
