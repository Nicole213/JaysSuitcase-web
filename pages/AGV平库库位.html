<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV平库库位管理</title>
    <link rel="stylesheet" href="../styles/pages.css">
    <link rel="stylesheet" href="../styles/agv-location.css">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1>AGV平库库位管理</h1>
        </div>

        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>库位编码：</label>
                    <input type="text" class="filter-input" id="searchCode" placeholder="请输入库位编码">
                </div>
                <div class="filter-group">
                    <label>所属库区：</label>
                    <select class="filter-select" id="areaFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>所属通道：</label>
                    <select class="filter-select" id="channelFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>当前状态：</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="">全部</option>
                        <option value="空库位">空库位</option>
                        <option value="有货">有货</option>
                        <option value="已分配">已分配</option>
                        <option value="空托">空托</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>锁定状态：</label>
                    <select class="filter-select" id="lockFilter">
                        <option value="">全部</option>
                        <option value="正常">正常</option>
                        <option value="锁定">锁定</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>启用状态：</label>
                    <select class="filter-select" id="enableFilter">
                        <option value="">全部</option>
                        <option value="启用">启用</option>
                        <option value="禁用">禁用</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>AGV站点：</label>
                    <select class="filter-select" id="agvSiteFilter">
                        <option value="">全部</option>
                        <option value="是">是</option>
                        <option value="否">否</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>站点类型：</label>
                    <select class="filter-select" id="siteTypeFilter">
                        <option value="">全部</option>
                        <option value="托盘交接站点">托盘交接站点</option>
                        <option value="AGV停靠站点">AGV停靠站点</option>
                        <option value="充电补给站点">充电补给站点</option>
                    </select>
                </div>
                <button class="search-btn" id="searchBtn">查询</button>
                <button class="reset-btn" id="resetBtn">重置</button>
            </div>
        </div>

        <div class="action-bar">
            <button class="primary-btn" id="addBtn">新增</button>
        </div>

        <div class="table-section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="150">库位编码</th>
                        <th width="160">库位名称</th>
                        <th width="170">所属库区</th>
                        <th width="170">所属通道</th>
                        <th width="100">当前状态</th>
                        <th width="100">锁定状态</th>
                        <th width="100">启用状态</th>
                        <th width="160">当前容器编号</th>
                        <th width="90">AGV站点</th>
                        <th width="180">站点类型</th>
                        <th width="240">操作</th>
                    </tr>
                </thead>
                <tbody id="locationTableBody"></tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" id="prevPage">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页</span>
            <button class="page-btn" id="nextPage">下一页</button>
        </div>
    </div>

    <div class="modal" id="locationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增AGV平库库位</h3>
                <span class="modal-close" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="locationForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">库位编码：</label>
                            <input type="text" class="form-input" id="locationCode" required>
                        </div>
                        <div class="form-group">
                            <label class="required">库位名称：</label>
                            <input type="text" class="form-input" id="locationName" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">所属库区：</label>
                            <select class="form-input" id="belongArea" required>
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">所属通道：</label>
                            <select class="form-input" id="channel" required>
                                <option value="">请选择</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">当前状态：</label>
                            <select class="form-input" id="currentStatus" required>
                                <option value="空库位">空库位</option>
                                <option value="有货">有货</option>
                                <option value="已分配">已分配</option>
                                <option value="空托">空托</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">启用状态：</label>
                            <select class="form-input" id="enableStatus" required>
                                <option value="启用">启用</option>
                                <option value="禁用">禁用</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>当前容器编号：</label>
                            <input type="text" class="form-input" id="containerNo" placeholder="请输入当前容器编号">
                        </div>
                        <div class="form-group">
                            <label class="required">锁定状态：</label>
                            <select class="form-input" id="lockStatus" required>
                                <option value="正常">正常</option>
                                <option value="锁定">锁定</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">AGV站点：</label>
                            <select class="form-input" id="isAgvSite" required>
                                <option value="否">否</option>
                                <option value="是">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>站点类型：</label>
                            <select class="form-input" id="siteType">
                                <option value="">请选择</option>
                                <option value="托盘交接站点">托盘交接站点</option>
                                <option value="AGV停靠站点">AGV停靠站点</option>
                                <option value="充电补给站点">充电补给站点</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>备注：</label>
                            <textarea class="form-input" id="remark" rows="3" placeholder="请输入备注信息"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn primary" id="saveBtn">保存</button>
                <button class="modal-btn secondary" id="cancelBtn">取消</button>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content modal-content-wide">
            <div class="modal-header">
                <h3>托盘详情</h3>
                <span class="modal-close" id="closeDetailModal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="detail-grid" id="detailSummary"></div>

                <div class="detail-section">
                    <div class="detail-section-header">
                        <h4>托盘明细</h4>
                    </div>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th width="160">托盘编号</th>
                                <th width="180">容器编号</th>
                                <th width="140">物料编码</th>
                                <th width="180">物料名称</th>
                                <th width="100">数量</th>
                            </tr>
                        </thead>
                        <tbody id="detailPallets"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="closeDetailBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="../scripts/agv-location.js"></script>
</body>
</html>
