<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV平库库区管理</title>
    <link rel="stylesheet" href="../styles/pages.css">
    <link rel="stylesheet" href="../styles/agv-flat-area.css">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1>AGV平库库区管理</h1>
        </div>

        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>库区编码：</label>
                    <input type="text" class="filter-input" id="searchCode" placeholder="请输入库区编码">
                </div>
                <div class="filter-group">
                    <label>库区名称：</label>
                    <input type="text" class="filter-input" id="searchName" placeholder="请输入库区名称">
                </div>
                <div class="filter-group">
                    <label>状态：</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="">全部</option>
                        <option value="启用">启用</option>
                        <option value="禁用">禁用</option>
                    </select>
                </div>
                <button class="search-btn" id="searchBtn">查询</button>
                <button class="reset-btn" id="resetBtn">重置</button>
            </div>
        </div>

        <div class="action-bar">
            <button class="primary-btn" id="addBtn">新增</button>
        </div>

        <div class="table-section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="140">库区编码</th>
                        <th width="180">库区名称</th>
                        <th width="100">状态</th>
                        <th width="220">备注</th>
                        <th width="180">创建时间</th>
                        <th width="180">操作</th>
                    </tr>
                </thead>
                <tbody id="agvAreaTableBody"></tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" id="prevPage">上一页</button>
            <span class="page-info">第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页</span>
            <button class="page-btn" id="nextPage">下一页</button>
        </div>
    </div>

    <div class="modal" id="agvAreaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增AGV平库库区</h3>
                <span class="modal-close" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="agvAreaForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">库区编码：</label>
                            <input type="text" class="form-input" id="areaCode" required>
                        </div>
                        <div class="form-group">
                            <label class="required">库区名称：</label>
                            <input type="text" class="form-input" id="areaName" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">状态：</label>
                            <select class="form-input" id="status" required>
                                <option value="启用">启用</option>
                                <option value="禁用">禁用</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>备注：</label>
                            <input type="text" class="form-input" id="remark" placeholder="请输入备注信息">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn primary" id="saveBtn">保存</button>
                <button class="modal-btn secondary" id="cancelBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="../scripts/agv-flat-area.js"></script>
</body>
</html>
